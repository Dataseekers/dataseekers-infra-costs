name: Monthly cost collection (OVH + BrightData + Bitbucket + Claude.ai)

on:
  schedule:
    - cron: "0 8 3 * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Collect monthly providers
        run: python main.py collect --month previous --providers ovh,brightdata,bitbucket,claude_ai --verbose
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          OVH_APPLICATION_KEY: ${{ secrets.OVH_APPLICATION_KEY }}
          OVH_APPLICATION_SECRET: ${{ secrets.OVH_APPLICATION_SECRET }}
          OVH_CONSUMER_KEY: ${{ secrets.OVH_CONSUMER_KEY }}
          BRIGHTDATA_API_TOKEN: ${{ secrets.BRIGHTDATA_API_TOKEN }}
          BITBUCKET_USERNAME: ${{ secrets.BITBUCKET_USERNAME }}
          BITBUCKET_API_TOKEN: ${{ secrets.BITBUCKET_API_TOKEN }}
          BITBUCKET_WORKSPACE: paraty
          BITBUCKET_SUBSCRIPTION_USD: "354.05"

      - name: Validate
        run: python main.py validate --month previous
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Report
        run: python main.py report --month previous
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Reminder if claude_ai entry missing
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python <<'EOF'
          import subprocess, yaml
          from datetime import date, timedelta

          end = date.today().replace(day=1)
          month = (end - timedelta(days=1)).strftime("%Y-%m")
          with open("config/bu-mapping.yaml") as f:
              cfg = yaml.safe_load(f) or {}
          if (cfg.get("claude_ai") or {}).get("monthly", {}).get(month):
              print(f"OK: claude_ai entry present for {month}")
              raise SystemExit(0)

          existing = subprocess.run(
              ["gh", "issue", "list",
               "--search", f"Update claude_ai.monthly for {month} in:title state:open",
               "--json", "number", "--jq", "length"],
              capture_output=True, text=True, check=True,
          ).stdout.strip()
          if existing != "0":
              print(f"Reminder issue for {month} already open")
              raise SystemExit(0)

          body = (
              f"Monthly cost collection found no entry for **{month}** under "
              "`claude_ai.monthly` in `config/bu-mapping.yaml`.\n\n"
              "1. Go to https://claude.ai/admin-settings/organization → Billing\n"
              f"2. Sum the subscription invoice (USD list price: 11 premium × $125 + 22 standard × $25) and the extra-usage auto-reloads (EUR) dated in {month}\n"
              f"3. Add an entry under `claude_ai.monthly`:\n"
              f"   ```yaml\n"
              f"   \"{month}\":\n"
              f"     subscription_usd: <usd>\n"
              f"     extra_usage_eur: <eur>\n"
              f"   ```\n"
              "4. Re-run [Monthly cost collection](../../actions/workflows/collect-monthly.yml)\n"
          )
          subprocess.run(
              ["gh", "issue", "create",
               "--title", f"Update claude_ai.monthly for {month}",
               "--body", body],
              check=True,
          )
          EOF
