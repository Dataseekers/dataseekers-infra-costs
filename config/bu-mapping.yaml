claude_ai:
  default: "platform"

  # Per calendar month, two components:
  #   subscription_usd: Team plan list price (Premium $125/seat + Standard $25/seat).
  #     Stable; refer to invoice line items for the cycle that starts in the month.
  #     Converted to EUR via ECB rate at start of the month (see currency.py).
  #   extra_usage_eur: sum of all auto-reload invoices dated in the month.
  #     Native EUR (no list USD price for these top-ups).
  # Update the day after each month closes; collector emits up to 2 records per entry.
  monthly:
    "2026-04":
      subscription_usd: 1925   # 11 premium × $125 + 22 standard × $25 (cycle Apr 21–May 21)
      extra_usage_eur: 882.48  # 18 auto-reloads

clickhouse:
  # Collector infers BU from the entityName substring (rentacar/hotels/puig/
  # retail/tickets/ferries/flights/turobserver/paraty→platform). Use the
  # services map below ONLY for overrides where the name-based rule is wrong.
  services: {}
  default: "platform"

  # CHC → USD conversion rates, derived from invoice cross-checks per cycle
  # (ClickHouse Cloud bills 18-to-18). Each entry's `rate` applies to
  # records whose `date` falls in [from, to] inclusive. Use null for
  # open-ended boundaries. Order does not matter; first match wins.
  # Refresh when a new invoice lands; the implied rate is:
  #   rate = invoice_usd / sum(chc) over the same date range
  chc_usd_rates:
    - {from: null,         to: "2026-01-17", rate: 0.9679}  # extrapolated (Dec 2025 invoice not yet cross-checked)
    - {from: "2026-01-18", to: "2026-02-17", rate: 0.9679}  # invoice $9,167.94
    - {from: "2026-02-18", to: "2026-03-17", rate: 0.9662}  # invoice $7,824.61
    - {from: "2026-03-18", to: "2026-04-17", rate: 0.9689}  # invoice $9,555.14
    - {from: "2026-04-18", to: null,         rate: 0.9689}  # carry forward latest known rate
